<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UCP Governance — Rule Engine Scenario Reference</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap');

:root {
  --bg: #080c14;
  --surface: #0d1320;
  --surface2: #111927;
  --border: #1a2540;
  --border2: #243050;
  --text: #c8d6ef;
  --text-dim: #5a7299;
  --text-bright: #e8f0ff;
  --accent: #3b8eea;
  --green: #34c771;
  --green-bg: #061a0e;
  --green-border: #0d3a1e;
  --red: #f05252;
  --red-bg: #160508;
  --red-border: #3a0c10;
  --amber: #f0a030;
  --amber-bg: #160d02;
  --amber-border: #3a2206;
  --orange: #f06830;
  --orange-bg: #160802;
  --blue: #3b8eea;
  --blue-bg: #050f1e;
  --blue-border: #0d2040;
  --purple: #9b6fe8;
  --purple-bg: #0f0820;
  --purple-border: #261655;
  --mono: 'JetBrains Mono', monospace;
  --sans: 'DM Sans', 'Segoe UI', sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; }
body { font-family: var(--sans); background: var(--bg); color: var(--text); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

/* ── Topbar ── */
.topbar {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 0 24px; height: 54px; display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0; z-index: 10;
}
.topbar-brand { display: flex; align-items: center; gap: 12px; }
.topbar-logo { width: 28px; height: 28px; background: var(--accent); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: 11px; font-weight: 700; color: #fff; }
.topbar-title { font-size: 14px; font-weight: 600; color: var(--text-bright); }
.topbar-sub { font-size: 12px; color: var(--text-dim); margin-left: 12px; }
.topbar-right { font-size: 11px; color: var(--text-dim); font-family: var(--mono); letter-spacing: 0.5px; }

/* ── Layout ── */
.layout { display: flex; flex: 1; overflow: hidden; }

/* ── Sidebar ── */
.sidebar { width: 288px; background: var(--surface); border-right: 1px solid var(--border); overflow-y: auto; flex-shrink: 0; padding: 12px 0 24px; }
.sidebar::-webkit-scrollbar { width: 4px; } 
.sidebar::-webkit-scrollbar-track { background: transparent; }
.sidebar::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

.sidebar-section { padding: 16px 16px 4px; }
.sidebar-section-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); font-family: var(--mono); }

.nav-item { padding: 8px 16px; cursor: pointer; display: flex; align-items: flex-start; gap: 10px; border-left: 2px solid transparent; transition: all 0.15s; }
.nav-item:hover { background: var(--surface2); }
.nav-item.active { background: rgba(59,142,234,0.07); border-left-color: var(--accent); }
.nav-item-id { font-size: 10px; font-family: var(--mono); color: var(--text-dim); min-width: 28px; padding-top: 1px; font-weight: 700; }
.nav-item-body { flex: 1; min-width: 0; }
.nav-item-title { font-size: 12px; color: var(--text); font-weight: 500; line-height: 1.4; }
.nav-item-tag { display: inline-flex; align-items: center; gap: 4px; font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 3px; margin-top: 3px; font-family: var(--mono); }
.t-sent { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }
.t-terminal { background: var(--red-bg); color: var(--red); border: 1px solid var(--red-border); }
.t-flush { background: #16100a; color: #c87040; border: 1px solid #3a2010; }
.t-queue-sent { background: #061420; color: #60a8e8; border: 1px solid #0d2840; }
.t-override { background: var(--purple-bg); color: var(--purple); border: 1px solid var(--purple-border); }
.t-bypass { background: #0a0e1e; color: #7090e0; border: 1px solid #1a2850; }

/* ── Content ── */
.content { flex: 1; overflow-y: auto; padding: 28px 32px; }
.content::-webkit-scrollbar { width: 6px; }
.content::-webkit-scrollbar-track { background: transparent; }
.content::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

/* ── Scenario Header ── */
.scenario-head { margin-bottom: 24px; }
.scenario-eyebrow { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
.scenario-id { font-family: var(--mono); font-size: 11px; font-weight: 700; color: var(--text-dim); }
.scenario-title { font-size: 24px; font-weight: 700; color: var(--text-bright); line-height: 1.25; }
.scenario-subtitle { font-size: 14px; color: var(--text-dim); margin-top: 4px; }

/* ── Context grid ── */
.ctx-grid { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 22px; }
.ctx-chip { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 7px 12px; }
.ctx-chip-label { font-size: 10px; font-family: var(--mono); color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.3px; }
.ctx-chip-value { font-size: 13px; color: var(--text-bright); font-weight: 600; margin-top: 2px; }

/* ── State section ── */
.section-header { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); font-family: var(--mono); margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
.section-header::after { content: ''; flex: 1; height: 1px; background: var(--border); }

.state-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 7px; margin-bottom: 22px; }
.state-row { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 7px 11px; display: flex; align-items: flex-start; gap: 8px; }
.state-dot { width: 7px; height: 7px; border-radius: 50%; margin-top: 4px; flex-shrink: 0; }
.d-ok { background: var(--green); }
.d-bad { background: var(--red); }
.d-warn { background: var(--amber); }
.d-info { background: var(--accent); }
.state-text { flex: 1; }
.state-label { font-size: 10px; color: var(--text-dim); font-family: var(--mono); }
.state-value { font-size: 12px; color: var(--text); font-weight: 500; margin-top: 1px; }

/* ── Pipeline ── */
.pipeline-wrap { margin-bottom: 22px; }
.pipeline-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.pipeline-table thead th { padding: 6px 10px; background: var(--surface); border: 1px solid var(--border); font-size: 10px; font-family: var(--mono); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-dim); text-align: left; }
.pipeline-table tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
.pipeline-table tbody tr:hover { background: rgba(255,255,255,0.02); }
.pipeline-table td { padding: 7px 10px; border-right: 1px solid var(--border); vertical-align: top; }

/* Row states */
tr.row-pass { }
tr.row-terminal { background: var(--red-bg); }
tr.row-defer { background: var(--amber-bg); }
tr.row-skip { opacity: 0.32; }
tr.row-send { background: var(--green-bg); }

.step-num { font-family: var(--mono); font-size: 11px; color: var(--text-dim); font-weight: 700; white-space: nowrap; }
.bucket-badge { display: inline-block; font-family: var(--mono); font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 3px; white-space: nowrap; }
.bk-b1 { background: var(--blue-bg); color: #60a8e8; border: 1px solid var(--blue-border); }
.bk-b2 { background: #060f06; color: #50c870; border: 1px solid #0a2010; }
.bk-b3 { background: #120900; color: #e09830; border: 1px solid #302000; }
.bk-b4 { background: var(--purple-bg); color: #b090f0; border: 1px solid var(--purple-border); }
.bk-b5 { background: var(--red-bg); color: #e07070; border: 1px solid var(--red-border); }

.rule-name { color: var(--text); font-weight: 500; }
.rule-note { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
.check-value { font-size: 11px; color: var(--text-dim); font-family: var(--mono); }
.check-note { font-size: 11px; color: var(--text-dim); margin-top: 2px; font-style: italic; }

.result-badge { display: inline-flex; align-items: center; gap: 4px; font-family: var(--mono); font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 3px; white-space: nowrap; }
.rb-pass { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }
.rb-terminal { background: var(--red-bg); color: var(--red); border: 1px solid var(--red-border); }
.rb-defer { background: var(--amber-bg); color: var(--amber); border: 1px solid var(--amber-border); }
.rb-skip { background: var(--surface2); color: var(--border2); border: 1px solid var(--border); }
.rb-send { background: var(--green-bg); color: #50e890; border: 1px solid var(--green-border); }
.rb-override { background: var(--purple-bg); color: var(--purple); border: 1px solid var(--purple-border); }

.send-row td { color: var(--green); font-weight: 600; }

/* ── Queue Lifecycle ── */
.queue-section { background: var(--surface); border: 1px solid var(--border2); border-radius: 10px; padding: 18px 20px; margin-bottom: 22px; }
.queue-section-title { font-size: 11px; font-family: var(--mono); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--amber); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
.queue-section-title::after { content:''; flex:1; height:1px; background: var(--amber-border); }

.queue-timeline { display: flex; flex-direction: column; }
.q-event { display: flex; gap: 0; }
.q-connector { width: 32px; display: flex; flex-direction: column; align-items: center; flex-shrink: 0; }
.q-dot { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }
.q-line { width: 2px; flex: 1; min-height: 16px; }
.q-body { flex: 1; padding-bottom: 18px; padding-left: 10px; }
.q-time { font-size: 10px; font-family: var(--mono); font-weight: 700; color: var(--text-dim); text-transform: uppercase; margin-bottom: 3px; }
.q-title { font-size: 13px; font-weight: 600; color: var(--text-bright); }
.q-desc { font-size: 12px; color: var(--text-dim); margin-top: 4px; line-height: 1.6; }
.q-code { display: block; font-family: var(--mono); font-size: 11px; background: var(--bg); border: 1px solid var(--border2); border-radius: 4px; padding: 7px 10px; margin-top: 8px; color: #60a8e8; line-height: 1.8; white-space: pre; }
.q-alert { display: inline-block; font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 3px; margin-top: 6px; font-family: var(--mono); }
.qa-flush { background: #16100a; color: #e07030; border: 1px solid #3a2010; }
.qa-terminal { background: var(--red-bg); color: var(--red); border: 1px solid var(--red-border); }
.qa-send { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }
.qa-event { background: #0e1020; color: #7090d0; border: 1px solid #182040; }

.qdot-queue { background: var(--amber); }
.qdot-event { background: var(--accent); }
.qdot-reeval { background: #8060e0; }
.qdot-flush { background: #e07030; }
.qdot-terminal { background: var(--red); }
.qdot-send { background: var(--green); }
.qdot-ttl { background: #e07030; }
.qline-amber { background: var(--amber-border); }
.qline-blue { background: var(--blue-border); }
.qline-purple { background: #261655; }
.qline-red { background: var(--red-border); }
.qline-green { background: var(--green-border); }
.qline-dim { background: var(--border); }

/* ── TS Dual Outcome ── */
.dual-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 22px; }
.dual-card { border-radius: 8px; padding: 16px 18px; }
.dual-on { background: var(--purple-bg); border: 1px solid var(--purple-border); }
.dual-off { background: #020f14; border: 1px solid var(--blue-border); }
.dual-header { font-size: 12px; font-weight: 700; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; font-family: var(--mono); }
.dual-on .dual-header { color: var(--purple); }
.dual-off .dual-header { color: var(--accent); }
.dual-body { font-size: 12px; color: var(--text-dim); line-height: 1.7; }
.dual-body strong { color: var(--text); }
.dual-code { font-family: var(--mono); font-size: 11px; background: rgba(0,0,0,0.4); padding: 2px 6px; border-radius: 3px; }

/* ── Outcome ── */
.outcome-box { border-radius: 10px; padding: 16px 20px; margin-bottom: 22px; }
.oc-send { background: var(--green-bg); border: 1px solid var(--green-border); }
.oc-terminal { background: var(--red-bg); border: 1px solid var(--red-border); }
.oc-flush { background: #100c06; border: 1px solid #3a2510; }
.oc-bypass { background: var(--blue-bg); border: 1px solid var(--blue-border); }
.outcome-top { display: flex; align-items: center; gap: 14px; margin-bottom: 8px; }
.outcome-icon { font-size: 26px; line-height: 1; }
.outcome-type { font-size: 16px; font-weight: 700; font-family: var(--mono); }
.oc-send .outcome-type { color: var(--green); }
.oc-terminal .outcome-type { color: var(--red); }
.oc-flush .outcome-type { color: #e07030; }
.oc-bypass .outcome-type { color: var(--accent); }
.outcome-code { font-family: var(--mono); font-size: 11px; padding: 2px 8px; border-radius: 3px; background: rgba(0,0,0,0.35); color: var(--text-dim); margin-left: 4px; }
.outcome-desc { font-size: 13px; color: var(--text-dim); line-height: 1.7; }
.outcome-desc strong { color: var(--text); }

/* ── Callout ── */
.callout { border-radius: 6px; padding: 10px 14px; margin: 10px 0; font-size: 12px; line-height: 1.6; }
.co-info { background: var(--blue-bg); border-left: 3px solid var(--accent); color: #80b8e8; }
.co-warn { background: var(--amber-bg); border-left: 3px solid var(--amber); color: #c08020; }
.co-rule { background: var(--surface2); border-left: 3px solid var(--border2); color: var(--text-dim); font-family: var(--mono); font-size: 11px; }

/* ── Pipeline reference panel ── */
.ref-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 22px; overflow: hidden; }
.ref-panel-header { padding: 12px 18px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; user-select: none; }
.ref-panel-header:hover { background: var(--surface2); }
.ref-panel-title { font-size: 12px; font-family: var(--mono); font-weight: 700; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }
.ref-chevron { color: var(--text-dim); transition: transform 0.2s; font-size: 12px; }
.ref-chevron.open { transform: rotate(180deg); }
.ref-content { display: none; border-top: 1px solid var(--border); }
.ref-content.open { display: block; }
.ref-table { width: 100%; border-collapse: collapse; font-size: 11px; }
.ref-table th { padding: 6px 10px; background: var(--bg); font-family: var(--mono); font-size: 10px; color: var(--text-dim); text-align: left; font-weight: 700; text-transform: uppercase; border-bottom: 1px solid var(--border); }
.ref-table td { padding: 5px 10px; border-bottom: 1px solid var(--border); color: var(--text-dim); vertical-align: middle; }
.ref-table tr:hover td { background: rgba(255,255,255,0.02); }
.ref-overridable { font-family: var(--mono); font-size: 10px; color: var(--amber); }
.ref-hard { font-family: var(--mono); font-size: 10px; color: var(--red); }

/* ── Transactional banner ── */
.txn-bypass-banner { background: var(--blue-bg); border: 1px solid var(--blue-border); border-radius: 10px; padding: 20px 24px; margin-bottom: 22px; text-align: center; }
.txn-bypass-icon { font-size: 36px; margin-bottom: 8px; }
.txn-bypass-title { font-size: 18px; font-weight: 700; color: #80b0f0; font-family: var(--mono); }
.txn-bypass-desc { font-size: 13px; color: var(--text-dim); margin-top: 6px; line-height: 1.7; }

@media (max-width: 900px) {
  .sidebar { width: 220px; }
  .dual-grid { grid-template-columns: 1fr; }
}
@media (max-width: 700px) {
  .layout { flex-direction: column; }
  .sidebar { width: 100%; max-height: 180px; flex-direction: row; overflow-x: auto; overflow-y: hidden; display: flex; padding: 8px; }
  .sidebar-section { display: none; }
  .nav-item { flex-shrink: 0; width: auto; padding: 6px 12px; border-left: none; border-bottom: 2px solid transparent; }
  .nav-item.active { border-left: none; border-bottom-color: var(--accent); }
}
</style>
</head>

<div class="topbar">
  <div class="topbar-brand">

<div class="layout">
  <div class="sidebar" id="sidebar"></div>

</div>

// ── Render Functions ────────────────────────────────────────────────────────

function bkBadge(bk) {
  return `<span class="bucket-badge bk-${bk.toLowerCase()}">${bk}</span>`;
}

function resultBadge(r) {
  const map = {
    pass: ['rb-pass','✓ PASS'],
    terminal: ['rb-terminal','✗ TERMINAL'],
    defer: ['rb-defer','⏸ DEFER'],
    skip: ['rb-skip','— SKIP'],
    send: ['rb-send','→ SEND'],
  };
  const [cls, label] = map[r] || ['rb-skip','?'];
  return `<span class="result-badge ${cls}">${label}</span>`;
}

function rowClass(r) {
  return {pass:'row-pass', terminal:'row-terminal', defer:'row-defer', skip:'row-skip', send:'row-send'}[r] || '';
}

function renderPipeline(sc) {
  if (sc.transactional) {
    return `<div class="txn-bypass-banner">
      <div class="txn-bypass-icon">⚡</div>
      <div class="txn-bypass-title">GOVERNANCE PIPELINE BYPASSED</div>
      <div class="txn-bypass-desc">Campaign type = TRANSACTIONAL. Steps 1–18 are not evaluated.<br>Message dispatched immediately at P0 priority.<br><br>
      Caps bypassed: B1 Volume Caps · B2 Retail Frequency Caps · B3 Format Frequency Caps<br>
      Cooldowns bypassed: B3 Format Cooldown · B2 Cross-Format Cooldown · B5 Global Cooldown<br>
      Timing bypassed: B1 Quiet Time<br><br>
      <strong style="color:#6090e0">Eligibility gates (Steps 1–5) applicability to transactionals: subject to approval workflow design (OI-6).</strong>
      </div>
    </div>`;
  }

  // Build full 18 steps from scenario's step data
  const stepMap = {};
  (sc.steps||[]).forEach(s => stepMap[s.n] = s);

  // Find first blocking step
  let firstBlock = null;
  for (let i=1; i<=18; i++) {
    const s = stepMap[i];
    if (s && (s.r==='terminal' || s.r==='defer')) { firstBlock = i; break; }
  }

  let rows = '';
  let allPass = (firstBlock===null);

  for (let i=1; i<=18; i++) {
    const def = STEPS[i-1];
    const s = stepMap[i] || {};
    let res = s.r || 'pass';
    if (!s.r && firstBlock && i > firstBlock) res = 'skip';

    const overridableMark = def.ov ? '<span style="font-size:10px;color:#9060d0;margin-left:4px;" title="Overridable by Time Sensitive Toggle">★ OV</span>' : '';

    rows += `<tr class="${rowClass(res)}">
      <td class="step-num">Step ${i}</td>
      <td>${bkBadge(def.bk)}</td>
      <td>
        <div class="rule-name">${def.rule}${overridableMark}</div>
        ${s.note ? `<div class="rule-note">${s.note}</div>` : ''}
      </td>
      <td><span class="check-value">${s.v||'—'}</span></td>
      <td>${resultBadge(res)}</td>
    </tr>`;
  }

  // Add SEND row if all pass
  if (allPass) {
    rows += `<tr class="row-send send-row">
      <td class="step-num">→</td>
      <td colspan="3"><strong>✓ ALL CHECKS PASSED → DISPATCH</strong></td>
      <td>${resultBadge('send')}</td>
    </tr>`;
  }

  return `<div class="pipeline-wrap">
    <div class="section-header">21-Step Evaluation Pipeline</div>
    <table class="pipeline-table">
      <thead><tr>
        <th>Step</th><th>Bucket</th><th>Rule</th><th>Value Checked</th><th>Result</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
    <div class="callout co-rule" style="margin-top:8px;">
      ★ OV = Overridable by Time Sensitive Override (Steps 12–15 only) · Hard Blocks (Steps 1–11, 16–18) cannot be overridden
    </div>
  </div>`;
}

function renderQueue(q) {
  if (!q) return '';
  let events = '';
  q.events.forEach((ev, idx) => {
    const isLast = idx === q.events.length-1;
    const alertHtml = ev.alert ? `<span class="q-alert ${ev.alert}">${
      ev.alert==='qa-send'?'→ MESSAGE SENT':
      ev.alert==='qa-flush'?'→ FLUSHED':
      ev.alert==='qa-terminal'?'→ TERMINAL BLOCK':
      ev.alert==='qa-event'?'→ STATE CHANGE':'→'
    }</span>` : '';
    events += `<div class="q-event">
      <div class="q-connector">
        <div class="q-dot ${ev.dot}"></div>
        ${!isLast ? `<div class="q-line ${ev.line}"></div>` : ''}
      </div>
      <div class="q-body">
        <div class="q-time">${ev.time}</div>
        <div class="q-title">${ev.title}</div>
        ${ev.desc ? `<div class="q-desc">${ev.desc}</div>` : ''}
        ${ev.code ? `<code class="q-code">${ev.code}</code>` : ''}
        ${alertHtml}
      </div>
    </div>`;
  });

  const noteHtml = q.reevalNote ? `<div class="callout co-warn" style="margin-top:12px;">${q.reevalNote}</div>` : '';

  return `<div class="queue-section">
    <div class="queue-section-title">Queue Lifecycle</div>
    <div class="queue-timeline">${events}</div>
    ${noteHtml}
  </div>`;
}

function renderDual(dual) {
  if (!dual) return '';
  return `<div class="section-header" style="margin-top:0">Time Sensitive Override — Dual Outcome</div>
  <div class="dual-grid">
    <div class="dual-card dual-on">
      <div class="dual-header">🔴 ${dual.on.title}</div>
      <div class="dual-body">${dual.on.body}<br><br><code class="dual-code">${dual.on.code}</code></div>
    </div>
    <div class="dual-card dual-off">
      <div class="dual-header">🟢 ${dual.off.title}</div>
      <div class="dual-body">${dual.off.body}<br><br><code class="dual-code">${dual.off.code}</code></div>
    </div>
  </div>`;
}

function renderOutcome(oc) {
  const codeSpan = oc.code ? '<span class="outcome-code">' + oc.code + '</span>' : '';
  return `<div class="outcome-box ${oc.cls}">
    <div class="outcome-top">
      <div class="outcome-icon">${oc.icon}</div>
      <div>
        <div class="outcome-type">${oc.type} ${codeSpan}</div>
      </div>
    </div>
    <div class="outcome-desc">${oc.desc}</div>
  </div>`;
}

function renderPipelineRef() {
  let rows = STEPS.map(s => `<tr>
    <td style="font-family:var(--mono);font-size:11px;color:#7090b0">${s.n}</td>
    <td>${bkBadge(s.bk)}</td>
    <td style="color:var(--text)">${s.rule}</td>
    <td>${s.type === 'terminal' ? '<span class="ref-hard">HARD BLOCK</span>' : '<span style="color:#d08020;font-family:var(--mono);font-size:10px">DEFER/QUEUE</span>'}</td>
    <td>${s.ov ? '<span class="ref-overridable">✓ YES</span>' : '<span style="color:#4a5a7a;font-size:10px;font-family:var(--mono)">—</span>'}</td>
  </tr>`).join('');
  return `<div class="ref-panel">
    <div class="ref-panel-header" onclick="toggleRef(this)">
      <span class="ref-panel-title">📋 Pipeline Reference — 18 Steps in Evaluation Order</span>
      <span class="ref-chevron" id="ref-chevron">▼</span>
    </div>
    <div class="ref-content" id="ref-content">
      <table class="ref-table">
        <thead><tr><th>#</th><th>Bucket</th><th>Rule</th><th>Fail Action</th><th>TS Override?</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
      <div style="padding:10px 12px;font-size:11px;color:var(--text-dim);border-top:1px solid var(--border);">
        Evaluation order: B5 → B4 → B3 → B2 → B1 &nbsp;·&nbsp; Hard blocks first, overridables last within each bucket &nbsp;·&nbsp; Queue re-evaluation always restarts from Step 1
      </div>
    </div>
  </div>`;
}

function toggleRef(el) {
  const content = document.getElementById('ref-content');
  const chevron = document.getElementById('ref-chevron');
  content.classList.toggle('open');
  chevron.classList.toggle('open');
}

function renderScenario(sc) {
  const ctxHtml = sc.ctx.map(c => `<div class="ctx-chip"><div class="ctx-chip-label">${c.label}</div><div class="ctx-chip-value">${c.value}</div></div>`).join('');
  const stateHtml = (sc.state||[]).map(s => `<div class="state-row"><div class="state-dot ${s.d}"></div><div class="state-text"><div class="state-label">${s.l}</div><div class="state-value">${s.v}</div></div></div>`).join('');

  return `
    ${renderPipelineRef()}
    <div class="scenario-head">
      <div class="scenario-eyebrow">
        <span class="scenario-id">${sc.id}</span>
        <span class="nav-item-tag ${sc.tag}">${sc.tagLabel}</span>
      </div>
      <div class="scenario-title">${sc.title}</div>
      <div class="scenario-subtitle">${sc.subtitle}</div>
    </div>

    <div class="ctx-grid">${ctxHtml}</div>

    ${sc.state && sc.state.length ? `<div class="section-header">Customer State at T₀</div><div class="state-grid">${stateHtml}</div>` : ''}

    ${renderPipeline(sc)}
    ${renderQueue(sc.queue)}
    ${renderDual(sc.dual)}
    ${renderOutcome(sc.outcome)}
  `;
}

// ── Sidebar ─────────────────────────────────────────────────────────────────

function buildSidebar() {
  const groups = [
    {label:'Happy Path', ids:['S01']},
    {label:'Terminal Blocks (Steps 1–5)', ids:['S02','S03','S04','S05','S06']},
    {label:'Queue Scenarios', ids:['S07','S08','S09','S10','S11']},
    {label:'Cooldown & Quiet Time', ids:['S12','S13','S14','S15']},
    {label:'Volume & Throughput', ids:['S16','S17']},
    {label:'Special Paths', ids:['S18']},
  ];

  let html = '';
  groups.forEach(g => {
    html += `<div class="sidebar-section"><div class="sidebar-section-label">${g.label}</div></div>`;
    g.ids.forEach(id => {
      const sc = SCENARIOS.find(s=>s.id===id);
      if (!sc) return;
      html += `<div class="nav-item" id="nav-${id}" onclick="loadScenario('${id}')">
        <span class="nav-item-id">${id}</span>
        <div class="nav-item-body">
          <div class="nav-item-title">${sc.title}</div>
          <div><span class="nav-item-tag ${sc.tag}">${sc.tagLabel}</span></div>
        </div>
      </div>`;
    });
  });
  document.getElementById('sidebar').innerHTML = html;
}

function loadScenario(id) {
  // Update active nav
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const navEl = document.getElementById('nav-'+id);
  if (navEl) { navEl.classList.add('active'); navEl.scrollIntoView({block:'nearest'}); }

  const sc = SCENARIOS.find(s=>s.id===id);
  if (!sc) return;
  document.getElementById('content').innerHTML = renderScenario(sc);
  document.getElementById('content').scrollTop = 0;
}

// ── Init ─────────────────────────────────────────────────────────────────────
buildSidebar();
loadScenario('S01');
</script>

</html>
